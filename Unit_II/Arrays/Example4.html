<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Objects</h1>

<p>JavaScript uses names to access object properties.</p>
<p id="demo"></p>

<script>
const person = {firstName:"sree", lastName:"leela", age:22};
document.getElementById("demo").innerHTML = person.firstName+" "+person.lastName;
</script

</body>
</html>
