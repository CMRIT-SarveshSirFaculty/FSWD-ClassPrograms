<!DOCTYPE html>
<html>
    <head>
        <title>CONDITIONAL STATEMENT-DEMO</title>
    </head>
    <body>
        <script>
              let salary = 7000;
                if(salary >= 5000)
                {
                    salary = salary + (salary * 0.1);
                    document.write("Employee salary: " +salary);
                }
                else
                {
                    salary = salary + (salary * 0.2);
                    document.write("Employee salary: " +salary);
                }
        </script>
    </body>
</html>
