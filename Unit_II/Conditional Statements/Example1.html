<!DOCTYPE html>
<html>
    <head>
        <title>CONDITIONAL STATEMENT-DEMO</title>
    </head>
    <body>
        <script>
        let num =prompt("Enter Any Number:");
 
        if (num % 2 === 0) {
            document.write("Given number is even number.");
        }
        
        if (num % 2 !== 0) {
            document.write("Given number is odd number.");
        };
        </script>
    </body>
</html>
