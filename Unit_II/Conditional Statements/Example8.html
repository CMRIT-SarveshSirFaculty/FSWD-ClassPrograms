<!DOCTYPE html>
<html>
    <head>
        <title>CONDITIONAL STATEMENT-DEMO</title>
    </head>
    <body>
        <script>
          let age;
            age = prompt("Enter your age: ");
            if (age < 18)
                    document.write("Child");
            else if ((age >= 18) && (age <= 60))
                    document.write("Adult");
            else if (age >= 60)
                    document.write("Senior");
            else
                    document.write("Invalid age");
        </script>
    </body>
</html>
