<!DOCTYPE html>
<html>
<body>

<h2>JavaScript Objects</h2>
<p>Creating a JavaScript empty Object then adds 4 properties:</p>

<p id="demo"></p>

<script>
const person = {};
person.firstName = "sree";
person.lastName = "leela";
person.age = 22;
person.eyeColor = "blue"; 

document.getElementById("demo").innerHTML =
person.firstName + " is " + person.age + " years old.";
</script>

</body>
</html>
