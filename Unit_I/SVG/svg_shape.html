<!doctype html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0">
    <title>SVG DEMO</title>
    <style>
        div {
            float: left;
        }
    </style>
</head>
<body>
    <h1>HTML5 svg tutorial</h1>
    <div>
        <p>line</p>
        <svg xmlns="http://www.w3.org/2000/svg" width="300px" height="200px">
            <line x1="20" y1="20" x2="220" y2="120" stroke="blue" stroke-width="5" />
        </svg>
    </div>
    <div>
        <p>rect</p>
        <svg xmlns="http://www.w3.org/2000/svg" width="300px" height="200px">
            <rect x="1" y="1" width="120" height="40" fill="blue" stroke="red" stroke-width="2" />
        </svg>
    </div>
    <div>
        <p>circle</p>
        <svg xmlns="http://www.w3.org/2000/svg" width="300px" height="200px">
            <circle cx="150" cy="100" r="50" fill="blue" stroke="red" stroke-width="3" />
        </svg>
    </div>
    <div>
        <p>ellipse</p>
        <svg xmlns="http://www.w3.org/2000/svg" width="300px" height="200px">
            <ellipse  cx="130" cy="80" rx="125" ry="50" fill="blue" />
        </svg>
    </div>
    <div>
        <p>polygon</p>
        <svg xmlns="http://www.w3.org/2000/svg" width="300px" height="200px">
            <polygon fill-rule="evenodd" fill="blue" stroke="black" points="148,16 116,96 196,48 100,48 180,96" />
        </svg>
    </div>
    <div>
        <p>path</p>
        <svg xmlns="http://www.w3.org/2000/svg" width="300px" height="200px">
            <path d="M 280,20 L 12,130 220,120 50,30" fill="none" stroke="blue" stroke-width="3" />
        </svg>
    </div>
</body>
</html>
